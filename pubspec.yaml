name: actionsgh
description: Gestor multi-cuenta para GitHub Actions. Monitorea runs en tiempo real y ejecuta workflows con inputs dinámicos de forma segura.

version: 2.0.0+2

environment:
  sdk: ^3.10.7

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  provider: ^6.1.2
  http: ^1.2.1
  flutter_secure_storage: ^9.2.2
  uuid: ^4.5.3


dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
